apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  serviceName: mysqldb
  replicas: 1

  selector:
    matchLabels:
      app: app-database

  template:
    metadata:
      labels:
        app: app-database
    spec:
      containers:
        - name: dbcont2
          image: bpranay/php:db
          ports:
            - containerPort: 3306

          # Secret integration
          envFrom:
            - secretRef:
                name: bankapp-db-secret

          # Resource limits
          resources:
            requests:
              memory: "120Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          volumeMounts:
            - name: pvc-1
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: pvc-1
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2    # Change to gp3 if your cluster uses gp3
        resources:
          requests:
            storage: 2Gi
